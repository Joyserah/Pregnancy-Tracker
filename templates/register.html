<!DOCTYPE html>
<html>
<head>
    <title>Puff & Glow - Register</title>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 50px auto; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #667eea; margin-bottom: 10px; }
        .tagline { text-align: center; color: #666; font-size: 0.9em; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; border: 2px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 1em; }
        button:hover { background: #5568d3; }
        .error { color: red; text-align: center; }
        a { color: #667eea; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .login-link { text-align: center; margin-top: 15px; }
        .hint { font-size: 0.8em; color: #888; margin: 2px 0 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🫁✨ Puff & Glow</h1>
        <p class="tagline">Pregnancy Care for Pulmonary Hypertension</p>
        <h2 style="text-align: center; color: #333;">Register</h2>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="POST" action="/register">
            <input type="text" name="first_name" placeholder="First Name" required pattern="[A-Za-z\s]+" title="Letters only">
            <input type="text" name="last_name" placeholder="Last Name" required pattern="[A-Za-z\s]+" title="Letters only">
            <input type="email" name="gmail" placeholder="Gmail Address" required>
            <input type="text" name="username" placeholder="Preferred Username" required>
            <input type="password" name="password" placeholder="Password" required pattern="(?=.*[A-Z]).{6,}" title="At least 6 characters with one capital letter">
            <p class="hint">Password must have at least one capital letter</p>
            <input type="text" name="recovery" placeholder="Recovery Gmail or Phone (10-11 digits)" required pattern="([A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}|[0-9]{10,11})" title="Enter a valid email or 10-11 digit phone number">
            <button type="submit">Register</button>
        </form>
        <p class="login-link">Already have an account? <a href="/">Login here</a></p>
    </div>
</body>
</html>
